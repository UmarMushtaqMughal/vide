version: 2
project_name: vide
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: vide
archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
nfpms:
  - maintainer: UmarMushtaqMughal
    description: A lightweight, terminal-based Verilog/SystemVerilog IDE.
    homepage: https://github.com/UmarMushtaqMughal/vide
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  github:
    owner: UmarMushtaqMughal
    name: vide
