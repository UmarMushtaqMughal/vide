version: 2
project_name: vide
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: vide
    ldflags:
      - -s -w -X github.com/UmarMushtaqMughal/vide/internal/updater.Version={{.Version}}
archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}'
nfpms:
  - maintainer: UmarMushtaqMughal
    description: A lightweight, terminal-based Verilog/SystemVerilog IDE.
    homepage: https://github.com/UmarMushtaqMughal/vide
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  github:
    owner: UmarMushtaqMughal
    name: vide
  prerelease: auto  # tags with -beta, -alpha, -rc are auto-marked as pre-release

aurs:
  - name: vide-bin
    homepage: "https://github.com/UmarMushtaqMughal/vide"
    description: "A lightweight, terminal-based Verilog/SystemVerilog IDE."
    maintainers:
      - "UmarMushtaqMughal"
    license: "MIT"
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/vide-bin.git'
    provides:
      - vide
    conflicts:
      - vide
    package: |-
      # bin
      install -Dm755 "./vide" "${pkgdir}/usr/bin/vide"
